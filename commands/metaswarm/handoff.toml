description = "Analyze the session and write a self-contained handoff doc for a fresh agent — outputs a single 'Read XXX.md and do YYY.' sentence"
prompt = """Invoke the metaswarm handoff skill. The user wants a session handoff so a fresh agent can resume the work with zero context loss.

Arguments / focus hints provided by the user: {{args}}

Follow the handoff workflow: reconstruct the objective and Definition of Done; load persisted state (.beads/plans/active-plan.md, .beads/context/*, `bd prime --work-type recovery`); establish current status and the real working-tree state (git status, recent commits, uncommitted/unpushed changes); identify all required reading (specs, designs, plans, code file:line anchors, tests) with why each matters; write a self-contained document to docs/handoffs/handoff-<YYYY-MM-DD-HHmm>.md; then emit exactly one closing sentence: `Read docs/handoffs/handoff-<...>.md and do <concrete next action>.`
"""
